<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 29.6" width="320" height="296">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff7b9c"/>
      <stop offset="100%" stop-color="#e25555"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#c94a4a" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    .heart {
      transform-box: fill-box;
      transform-origin: 50% 45%;
      animation: pulse 1.2s ease-in-out infinite;
